<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightcraft — New Project Intake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.app { max-width: 700px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0dc; display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.header-text h1 { font-size: 18px; font-weight: 600; }
.header-text p { font-size: 13px; color: #666; margin-top: 2px; }
.section { background: white; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 5px; }
.req { color: #c0392b; }
.hint { font-size: 11px; color: #999; font-weight: 400; margin-left: 4px; }
input, select, textarea { width: 100%; font-family: inherit; font-size: 14px; color: #1a1a1a; background: #fafaf8; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; outline: none; transition: border-color 0.15s; }
input:focus, select:focus, textarea:focus { border-color: #1a1a1a; background: white; }
textarea { resize: vertical; min-height: 72px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.computed { display: grid; grid-template-columns: 150px 1fr; gap: 12px; margin-bottom: 14px; }
.cf { background: #f5f5f3; border: 1px solid #e8e8e4; border-radius: 8px; padding: 8px 10px; }
.cf-label { font-size: 10px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.cf-value { font-size: 14px; font-weight: 500; color: #1a1a1a; min-height: 20px; word-break: break-all; }
.check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.check-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #1a1a1a; }
.check-row label { font-size: 13px; color: #333; cursor: pointer; margin-bottom: 0; }
.divider { height: 1px; background: #f0f0ec; margin: 14px 0; }
.toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
.toggle button { flex: 1; padding: 8px 12px; font-size: 13px; font-family: inherit; border: none; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.toggle button.active { background: #1a1a1a; color: white; }
.toggle button:not(.active) { background: #fafaf8; color: #666; }
.search-wrap { position: relative; }
.results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100; max-height: 220px; overflow-y: auto; }
.result-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f5f5f3; }
.result-item:last-child { border-bottom: none; }
.result-item:hover { background: #f5f5f3; }
.result-name { font-size: 14px; color: #1a1a1a; font-weight: 500; }
.result-legal { font-size: 12px; color: #888; margin-top: 1px; }
.result-empty { padding: 10px 12px; font-size: 13px; color: #999; }
.pill { display: inline-flex; align-items: center; gap: 6px; background: #1a1a1a; color: white; border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 13px; font-weight: 500; margin-top: 6px; }
.pill button { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; display: flex; }
.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; }
.btn { padding: 9px 22px; font-size: 14px; font-family: inherit; border-radius: 8px; cursor: pointer; font-weight: 500; }
.btn-primary { background: #1a1a1a; color: white; border: none; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #666; border: 1px solid #ddd; }
.status { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-top: 1rem; line-height: 1.5; }
.status.success { background: #f0faf4; color: #1a7a40; border: 1px solid #b3e8c8; }
.status.error { background: #fef5f5; color: #c0392b; border: 1px solid #f5c6c6; }
.status.loading { background: #f5f5f3; color: #666; border: 1px solid #e8e8e4; }
.loading-bar { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">LC</div>
    <div class="header-text">
      <h1>New project intake</h1>
      <p>Lightcraft Project Management &mdash; creates records directly in Airtable</p>
    </div>
  </div>
  <div id="loadingMsg" class="loading-bar">Loading production companies...</div>
  <div id="mainForm" style="display:none;">
    <div class="section">
      <div class="section-title">Project details</div>
      <div class="row2">
        <div class="field">
          <label>Project name<span class="req">*</span></label>
          <input type="text" id="projectName" placeholder="e.g. Ally Clark" oninput="updateSRL()">
        </div>
        <div class="field">
          <label>LC Entity<span class="req">*</span></label>
          <select id="lcEntity" onchange="updateSRL()">
            <option value="">Select entity...</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="LC East">LC East (LE)</option>
            <option value="LC UK">LC UK (UK)</option>
            <option value="LC Spain">LC Spain (EU)</option>
            <option value="LC OH">LC OH (OH)</option>
            <option value="LC NM">LC NM (NM)</option>
          </select>
        </div>
      </div>
      <div class="computed">
        <div class="cf"><div class="cf-label">Project number</div><div class="cf-value" id="previewPN">&#8212;</div></div>
        <div class="cf"><div class="cf-label">SRL (auto-assembled)</div><div class="cf-value" id="previewSRL">&#8212;</div></div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Payroll default</label>
          <select id="payrollDefault">
            <option value="">Select...</option>
            <option value="Prod TC_600">Prod TC_600</option>
            <option value="LC">LC</option>
            <option value="Prod TC_NU">Prod TC_NU</option>
            <option value="TBD">TBD</option>
            <option value="UK">UK</option>
            <option value="Aether">Aether</option>
          </select>
        </div>
        <div class="field">
          <label>Season</label>
          <input type="text" id="season" placeholder="e.g. S1, S2">
        </div>
      </div>
      <div style="display:flex; gap:24px; margin-bottom:14px;">
        <div class="check-row"><input type="checkbox" id="recurring"><label for="recurring">Recurring project</label></div>
        <div class="check-row"><input type="checkbox" id="keepActive"><label for="keepActive">Keep active</label></div>
      </div>
      <div class="divider"></div>
      <div class="field"><label>Project notes</label><textarea id="projectNotes" placeholder="General notes, director, DP, special circumstances..."></textarea></div>
      <div class="field"><label>Systems of interest</label><textarea id="systemsOfInterest" placeholder="UAS platforms, cameras, special equipment..." style="min-height:56px;"></textarea></div>
    </div>
    <div class="section">
      <div class="section-title">Production company</div>
      <div class="toggle">
        <button class="active" onclick="setMode('existing')" id="btnExisting">Select existing company</button>
        <button onclick="setMode('new')" id="btnNew">+ Add new company</button>
      </div>
      <div id="existingSection">
        <div class="field">
          <label>Search production companies<span class="req">*</span></label>
          <div class="search-wrap">
            <input type="text" id="companySearch" placeholder="Type to search..." oninput="searchCos()" autocomplete="off">
            <div class="results" id="searchResults" style="display:none;"></div>
          </div>
          <div id="selectedDisplay"></div>
        </div>
      </div>
      <div id="newSection" style="display:none;">
        <div class="field">
          <label>Company working name<span class="req">*</span><span class="hint">Used in SRL and day-to-day references</span></label>
          <input type="text" id="newWorkingName" placeholder="e.g. Golden Leo" oninput="updateSRL()">
        </div>
        <div class="field"><label>Legal entity name<span class="hint">For invoices and contracts</span></label><input type="text" id="newLegalName" placeholder="Full legal name if known"></div>
        <div class="row2">
          <div class="field"><label>Billing contact name</label><input type="text" id="newBillingContact"></div>
          <div class="field"><label>Billing contact email</label><input type="email" id="newBillingEmail"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Billing contact phone</label><input type="tel" id="newBillingPhone"></div>
          <div class="field"><label>Producer payroll email</label><input type="email" id="newPayrollEmail"></div>
        </div>
        <div class="field"><label>Billing address</label><textarea id="newBillingAddress" style="min-height:56px;" placeholder="Full billing address"></textarea></div>
        <div class="field"><label>Billing notes</label><textarea id="newBillingNotes" style="min-height:56px;" placeholder="Special billing instructions, payment terms..."></textarea></div>
        <div class="check-row"><input type="checkbox" id="newStudioVendor"><label for="newStudioVendor">Studio vendor (insurance &amp; contracts on file)</label></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="clearForm()">Clear form</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">Create project</button>
    </div>
    <div id="statusMsg" style="display:none;"></div>
  </div>
</div>
<script>
const BASE="appX3LNIvzae1gxdb",PT="tblMrGl8Pwv5gqz36",CT="tblNea0IkHGn1XTNS";
const _t1="patPO4LsK11k8zN5s.",_t2="70c8b462e95b8ff96968dfe8685cbf69e59f154019717e0ad8fb835c8e7054d3",TOKEN=_t1+_t2;
const PF={name:"fld159op32DNyVgsF",entity:"fldJ6FtzufkctoUTn",payroll:"fldeV01p4F7a2Xk5q",season:"fld725JNax2WxtnBM",recurring:"fldM6R6TbyEQsoTwe",keepActive:"fld9U47LrEHS7jzVa",notes:"fld9HZtxzJiFnNzE7",systems:"fldqGR2MfUAPIryhK",companies:"fldYSUi6Z7ndYgCsv"};
const CF={working:"fld9Fo7Vmx36ukzDD",legal:"fldla0Wt3iib8NJ8b",billingContact:"fldYE5QJZ17rkGmkx",billingAddr:"fldqYtoSPtAuhVwwi",billingEmail:"fldidZ1IRlP7UulyF",billingPhone:"fldHVEQGujTbqKXb0",billingNotes:"fldYzxgdvawaJER1U",studio:"fldr9BWzy0cvAmsUd",payrollEmail:"fldQDVAE6YOzBDT43"};
const PREFIX={"Los Angeles":"","LC East":"LE","LC UK":"UK","LC Spain":"EU","LC OH":"OH","LC NM":"NM"};
let mode="existing",selectedCo=null,companies=[],nextNum=1;
async function at(method,path,body){const opts={method,headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"}};if(body)opts.body=JSON.stringify(body);const res=await fetch("https://api.airtable.com/v0/"+BASE+"/"+path,opts);if(!res.ok)throw new Error("Airtable error "+res.status);return res.json();}
async function init(){try{const cd=await at("GET",CT+"?fields%5B%5D="+CF.working+"&fields%5B%5D="+CF.legal+"&pageSize=100");companies=(cd.records||[]).map(r=>({id:r.id,working:r.fields[CF.working]||"",legal:r.fields[CF.legal]||""}));const pd=await at("GET",PT+"?fields%5B%5D=fldFNVW27yXF3v7Ds&sort%5B0%5D%5Bfield%5D=fldFNVW27yXF3v7Ds&sort%5B0%5D%5Bdirection%5D=desc&maxRecords=1");nextNum=pd.records&&pd.records.length>0?(pd.records[0].fields["fldFNVW27yXF3v7Ds"]||0)+1:1;document.getElementById("loadingMsg").style.display="none";document.getElementById("mainForm").style.display="block";updateSRL();}catch(e){document.getElementById("loadingMsg").textContent="Error: "+e.message;}}
function fmtNum(n,entity){return(PREFIX[entity]||"")+"3"+String(n).padStart(4,"0");}
function updateSRL(){const pn=document.getElementById("projectName").value.trim(),entity=document.getElementById("lcEntity").value,coEl=document.getElementById("newWorkingName"),co=mode==="existing"?(selectedCo?selectedCo.working:""):(coEl?coEl.value.trim():""),pnEl=document.getElementById("previewPN"),srlEl=document.getElementById("previewSRL");if(entity&&nextNum){const num=fmtNum(nextNum,entity);pnEl.textContent=num;srlEl.textContent=co&&pn?num+"_"+co+"_"+pn:co?num+"_"+co+"_…":pn?num+"_…_"+pn:num;}else{pnEl.textContent="—";srlEl.textContent="—";}}
function setMode(m){mode=m;document.getElementById("btnExisting").className=m==="existing"?"active":"";document.getElementById("btnNew").className=m==="new"?"active":"";document.getElementById("existingSection").style.display=m==="existing"?"":"none";document.getElementById("newSection").style.display=m==="new"?"":"none";updateSRL();}
function searchCos(){const q=document.getElementById("companySearch").value.toLowerCase(),res=document.getElementById("searchResults");if(!q){res.style.display="none";return;}const hits=companies.filter(c=>c.working.toLowerCase().includes(q));if(!hits.length){res.innerHTML='<div class="result-empty">No matches — switch to "+ Add new company" to create one</div>';res.style.display="block";return;}res.innerHTML=hits.slice(0,10).map(c=>'<div class="result-item" onclick="selectCo(\''+c.id+'\',\''+c.working.replace(/'/g,"\\'")+'\',\''+c.legal.replace(/'/g,"\\'")+"\')"><div class=\"result-name\">"+c.working+"</div>"+(c.legal?'<div class="result-legal">'+c.legal+"</div>":"")+"</div>").join("");res.style.display="block";}
function selectCo(id,working,legal){selectedCo={id,working,legal};document.getElementById("searchResults").style.display="none";document.getElementById("companySearch").value="";document.getElementById("selectedDisplay").innerHTML='<div class="pill"><span>'+working+(legal?" — "+legal:"")+'</span><button onclick="clearCo()">✕</button></div>';updateSRL();}
function clearCo(){selectedCo=null;document.getElementById("selectedDisplay").innerHTML="";updateSRL();}
function v(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function showStatus(msg,type){const el=document.getElementById("statusMsg");el.style.display="block";el.className="status "+type;el.textContent=msg;}
async function submitForm(){const pname=v("projectName"),entity=document.getElementById("lcEntity").value;if(!pname){showStatus("Project name is required.","error");return;}if(!entity){showStatus("LC Entity is required.","error");return;}if(mode==="existing"&&!selectedCo){showStatus("Please select a production company.","error");return;}if(mode==="new"&&!v("newWorkingName")){showStatus("Company working name is required.","error");return;}document.getElementById("submitBtn").disabled=true;showStatus("Creating project...","loading");try{let coId=selectedCo?selectedCo.id:null;if(mode==="new"){showStatus("Creating production company...","loading");const cf={};cf[CF.working]=v("newWorkingName");if(v("newLegalName"))cf[CF.legal]=v("newLegalName");if(v("newBillingContact"))cf[CF.billingContact]=v("newBillingContact");if(v("newBillingEmail"))cf[CF.billingEmail]=v("newBillingEmail");if(v("newBillingPhone"))cf[CF.billingPhone]=v("newBillingPhone");if(v("newPayrollEmail"))cf[CF.payrollEmail]=v("newPayrollEmail");if(v("newBillingAddress"))cf[CF.billingAddr]=v("newBillingAddress");if(v("newBillingNotes"))cf[CF.billingNotes]=v("newBillingNotes");if(document.getElementById("newStudioVendor").checked)cf[CF.studio]=true;const nc=await at("POST",CT,{fields:cf});coId=nc.id;}showStatus("Creating project record...","loading");const pf={};pf[PF.name]=pname;pf[PF.entity]=entity;if(coId)pf[PF.companies]=[{id:coId}];if(v("payrollDefault"))pf[PF.payroll]=v("payrollDefault");if(v("season"))pf[PF.season]=v("season");if(document.getElementById("recurring").checked)pf[PF.recurring]=true;if(document.getElementById("keepActive").checked)pf[PF.keepActive]=true;if(v("projectNotes"))pf[PF.notes]=v("projectNotes");if(v("systemsOfInterest"))pf[PF.systems]=v("systemsOfInterest");await at("POST",PT,{fields:pf});const srl=document.getElementById("previewSRL").textContent;nextNum++;updateSRL();showStatus("Project created! SRL: "+srl+". Go to Airtable to check Build Shoot Range.","success");document.getElementById("submitBtn").disabled=false;}catch(e){showStatus("Error: "+e.message,"error");document.getElementById("submitBtn").disabled=false;}}
function clearForm(){["projectName","season","projectNotes","systemsOfInterest","companySearch","newWorkingName","newLegalName","newBillingContact","newBillingEmail","newBillingPhone","newPayrollEmail","newBillingAddress","newBillingNotes"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});document.getElementById("lcEntity").value="";document.getElementById("payrollDefault").value="";document.getElementById("recurring").checked=false;document.getElementById("keepActive").checked=false;const sv=document.getElementById("newStudioVendor");if(sv)sv.checked=false;clearCo();setMode("existing");document.getElementById("statusMsg").style.display="none";updateSRL();}
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))document.getElementById("searchResults").style.display="none";});
init();
</script>
</body>
</html>
