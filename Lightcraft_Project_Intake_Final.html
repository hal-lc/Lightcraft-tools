<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightcraft — New Project Intake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.app{max-width:700px;margin:0 auto}
.header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e0e0dc;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0}
h1{font-size:18px;font-weight:600}
.sub{font-size:13px;color:#666;margin-top:2px}
.section{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.stitle{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:13px;font-weight:500;color:#333;margin-bottom:5px}
.req{color:#c0392b}
.hint{font-size:11px;color:#999;font-weight:400;margin-left:4px}
input,select,textarea{width:100%;font-family:inherit;font-size:14px;color:#1a1a1a;background:#fafaf8;border:1px solid #ddd;border-radius:8px;padding:8px 10px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#1a1a1a;background:white}
textarea{resize:vertical;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.computed{display:grid;grid-template-columns:150px 1fr;gap:12px;margin-bottom:14px}
.cf{background:#f5f5f3;border:1px solid #e8e8e4;border-radius:8px;padding:8px 10px}
.cfl{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.cfv{font-size:14px;font-weight:500;color:#1a1a1a;min-height:20px;word-break:break-all}
.cr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cr input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#1a1a1a}
.cr label{font-size:13px;color:#333;cursor:pointer;margin-bottom:0}
.divider{height:1px;background:#f0f0ec;margin:14px 0}
.toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:14px}
.toggle button{flex:1;padding:8px 12px;font-size:13px;font-family:inherit;border:none;cursor:pointer;font-weight:500;transition:all .15s}
.toggle button.active{background:#1a1a1a;color:white}
.toggle button:not(.active){background:#fafaf8;color:#666}
.swrap{position:relative}
.sresults{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;max-height:220px;overflow-y:auto;display:none}
.sitem{padding:8px 12px;cursor:pointer;border-bottom:1px solid #f5f5f3}
.sitem:last-child{border-bottom:none}
.sitem:hover{background:#f5f5f3}
.sname{font-size:14px;color:#1a1a1a;font-weight:500}
.slegal{font-size:12px;color:#888;margin-top:1px}
.sempty{padding:10px 12px;font-size:13px;color:#999}
.pill{display:inline-flex;align-items:center;gap:6px;background:#1a1a1a;color:white;border-radius:20px;padding:4px 10px 4px 12px;font-size:13px;font-weight:500;margin-top:6px}
.pill button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1rem}
.btn{padding:9px 22px;font-size:14px;font-family:inherit;border-radius:8px;cursor:pointer;font-weight:500}
.btnp{background:#1a1a1a;color:white;border:none}
.btnp:hover{background:#333}
.btnp:disabled{opacity:.4;cursor:not-allowed}
.btng{background:transparent;color:#666;border:1px solid #ddd}
.btng:hover{background:#f5f5f3}
.status{padding:12px 14px;border-radius:8px;font-size:14px;margin-top:1rem;line-height:1.5;display:none}
.ok{background:#f0faf4;color:#1a7a40;border:1px solid #b3e8c8}
.err{background:#fef5f5;color:#c0392b;border:1px solid #f5c6c6}
.loading-bar{text-align:center;padding:2rem;color:#888;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">LC</div>
    <div>
      <h1>New project intake</h1>
      <div class="sub">Lightcraft Project Management &mdash; creates records directly in Airtable</div>
    </div>
  </div>
  <div id="loadingMsg" class="loading-bar">Loading production companies...</div>
  <div id="mainForm" style="display:none">
    <div class="section">
      <div class="stitle">Project details</div>
      <div class="row2">
        <div class="field">
          <label>Project name<span class="req">*</span></label>
          <input type="text" id="projectName" placeholder="e.g. Ally Clark" oninput="updateSRL()">
        </div>
        <div class="field">
          <label>LC Entity<span class="req">*</span></label>
          <select id="lcEntity" onchange="updateSRL()">
            <option value="">Select entity...</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="LC East">LC East (LE)</option>
            <option value="LC UK">LC UK (UK)</option>
            <option value="LC Spain">LC Spain (EU)</option>
            <option value="LC OH">LC OH (OH)</option>
            <option value="LC NM">LC NM (NM)</option>
          </select>
        </div>
      </div>
      <div class="computed">
        <div class="cf"><div class="cfl">Project number</div><div class="cfv" id="previewPN">&mdash;</div></div>
        <div class="cf"><div class="cfl">SRL (auto-assembled)</div><div class="cfv" id="previewSRL">&mdash;</div></div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Payroll default</label>
          <select id="payrollDefault">
            <option value="">Select...</option>
            <option value="Prod TC_600">Prod TC_600</option>
            <option value="LC">LC</option>
            <option value="Prod TC_NU">Prod TC_NU</option>
            <option value="TBD">TBD</option>
            <option value="UK">UK</option>
            <option value="Aether">Aether</option>
          </select>
        </div>
        <div class="field">
          <label>Season</label>
          <input type="text" id="season" placeholder="e.g. S1, S2">
        </div>
      </div>
      <div style="display:flex;gap:24px;margin-bottom:14px">
        <div class="cr"><input type="checkbox" id="recurring"><label for="recurring">Recurring project</label></div>
        <div class="cr"><input type="checkbox" id="keepActive"><label for="keepActive">Keep active</label></div>
      </div>
      <div class="divider"></div>
      <div class="field"><label>Project notes</label><textarea id="projectNotes" placeholder="General notes, director, DP, special circumstances..."></textarea></div>
      <div class="field"><label>Systems of interest</label><textarea id="systemsOfInterest" placeholder="UAS platforms, cameras, special equipment..." style="min-height:56px"></textarea></div>
    </div>
    <div class="section">
      <div class="stitle">Production company</div>
      <div class="toggle">
        <button class="active" id="btnExisting" onclick="setMode('existing')">Select existing company</button>
        <button id="btnNew" onclick="setMode('new')">+ Add new company</button>
      </div>
      <div id="existingSection">
        <div class="field">
          <label>Search production companies<span class="req">*</span></label>
          <div class="swrap">
            <input type="text" id="companySearch" placeholder="Type to search..." oninput="searchCos()" autocomplete="off">
            <div class="sresults" id="searchResults"></div>
          </div>
          <div id="selectedDisplay"></div>
        </div>
      </div>
      <div id="newSection" style="display:none">
        <div class="field">
          <label>Company working name<span class="req">*</span><span class="hint">Used in SRL and day-to-day references</span></label>
          <input type="text" id="newWorkingName" placeholder="e.g. Golden Leo" oninput="updateSRL()">
        </div>
        <div class="field"><label>Legal entity name<span class="hint">For invoices and contracts</span></label><input type="text" id="newLegalName" placeholder="Full legal name if known"></div>
        <div class="row2">
          <div class="field"><label>Billing contact name</label><input type="text" id="newBillingContact"></div>
          <div class="field"><label>Billing contact email</label><input type="email" id="newBillingEmail"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Billing contact phone</label><input type="tel" id="newBillingPhone"></div>
          <div class="field"><label>Producer payroll email</label><input type="email" id="newPayrollEmail"></div>
        </div>
        <div class="field"><label>Billing address</label><textarea id="newBillingAddress" style="min-height:56px" placeholder="Full billing address"></textarea></div>
        <div class="field"><label>Billing notes</label><textarea id="newBillingNotes" style="min-height:56px" placeholder="Special billing instructions, payment terms..."></textarea></div>
        <div class="cr"><input type="checkbox" id="newStudioVendor"><label for="newStudioVendor">Studio vendor (insurance &amp; contracts on file)</label></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btng" onclick="clearForm()">Clear form</button>
      <button class="btn btnp" id="submitBtn" onclick="submitForm()">Create project</button>
    </div>
    <div id="statusMsg" class="status"></div>
  </div>
</div>
<script>
var BASE="appX3LNIvzae1gxdb",PT="tblMrGl8Pwv5gqz36",CT="tblNea0IkHGn1XTNS";
var t1="patPO4LsK11k8zN5s.",t2="70c8b462e95b8ff96968dfe8685cbf69e59f154019717e0ad8fb835c8e7054d3",TOK=t1+t2;
var PF={name:"fld159op32DNyVgsF",entity:"fldJ6FtzufkctoUTn",payroll:"fldeV01p4F7a2Xk5q",season:"fld725JNax2WxtnBM",recurring:"fldM6R6TbyEQsoTwe",keepActive:"fld9U47LrEHS7jzVa",notes:"fld9HZtxzJiFnNzE7",systems:"fldqGR2MfUAPIryhK",companies:"fldYSUi6Z7ndYgCsv"};
var CF={working:"fld9Fo7Vmx36ukzDD",legal:"fldla0Wt3iib8NJ8b",bContact:"fldYE5QJZ17rkGmkx",bAddr:"fldqYtoSPtAuhVwwi",bEmail:"fldidZ1IRlP7UulyF",bPhone:"fldHVEQGujTbqKXb0",bNotes:"fldYzxgdvawaJER1U",studio:"fldr9BWzy0cvAmsUd",pEmail:"fldQDVAE6YOzBDT43"};
var PREFIX={"Los Angeles":"","LC East":"LE","LC UK":"UK","LC Spain":"EU","LC OH":"OH","LC NM":"NM"};
var mode="existing",selCo=null,cos=[],nextNum=1;

function g(id){return document.getElementById(id);}
function gv(id){var el=g(id);return el?el.value.trim():"";}

async function at(method,path,body){
  var opts={method:method,headers:{"Authorization":"Bearer "+TOK,"Content-Type":"application/json"}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch("https://api.airtable.com/v0/"+BASE+"/"+path,opts);
  if(!res.ok)throw new Error("API error "+res.status);
  return res.json();
}

async function init(){
  try{
    var cd=await at("GET",CT+"?fields[]="+CF.working+"&fields[]="+CF.legal+"&pageSize=100");
    cos=(cd.records||[]).map(function(r){return{id:r.id,working:r.fields[CF.working]||"",legal:r.fields[CF.legal]||""};});
    var pd=await at("GET",PT+"?fields[]=fldFNVW27yXF3v7Ds&sort[0][field]=fldFNVW27yXF3v7Ds&sort[0][direction]=desc&maxRecords=1");
    nextNum=pd.records&&pd.records.length>0?(pd.records[0].fields["fldFNVW27yXF3v7Ds"]||0)+1:1;
    g("loadingMsg").style.display="none";
    g("mainForm").style.display="block";
    updateSRL();
  }catch(e){
    g("loadingMsg").textContent="Error loading: "+e.message;
  }
}

function fmtNum(n,entity){
  var p=PREFIX[entity]||"";
  return p+"3"+("000"+n).slice(-4);
}

function updateSRL(){
  var pn=gv("projectName"),entity=g("lcEntity").value;
  var coEl=g("newWorkingName"),co=mode==="existing"?(selCo?selCo.working:""):(coEl?coEl.value.trim():"");
  var pnEl=g("previewPN"),srlEl=g("previewSRL");
  if(entity&&nextNum){
    var num=fmtNum(nextNum,entity);
    pnEl.textContent=num;
    if(co&&pn)srlEl.textContent=num+"_"+co+"_"+pn;
    else if(co)srlEl.textContent=num+"_"+co+"_\u2026";
    else if(pn)srlEl.textContent=num+"_\u2026_"+pn;
    else srlEl.textContent=num;
  }else{pnEl.textContent="\u2014";srlEl.textContent="\u2014";}
}

function setMode(m){
  mode=m;
  g("btnExisting").className=m==="existing"?"active":"";
  g("btnNew").className=m==="new"?"active":"";
  g("existingSection").style.display=m==="existing"?"":"none";
  g("newSection").style.display=m==="new"?"":"none";
  updateSRL();
}

function searchCos(){
  var q=gv("companySearch").toLowerCase(),res=g("searchResults");
  if(!q){res.style.display="none";return;}
  var hits=cos.filter(function(c){return c.working.toLowerCase().indexOf(q)>=0;});
  if(!hits.length){
    res.innerHTML='<div class="sempty">No matches \u2014 switch to "+ Add new company" to create one</div>';
    res.style.display="block";return;
  }
  var html="";
  hits.slice(0,10).forEach(function(c){
    html+='<div class="sitem" onclick="selectCo(this)" data-id="'+c.id+'" data-working="'+c.working.replace(/"/g,'&quot;')+'" data-legal="'+c.legal.replace(/"/g,'&quot;')+'">';
    html+='<div class="sname">'+c.working+'</div>';
    if(c.legal)html+='<div class="slegal">'+c.legal+'</div>';
    html+='</div>';
  });
  res.innerHTML=html;
  res.style.display="block";
}

function selectCo(el){
  var id=el.getAttribute("data-id"),working=el.getAttribute("data-working"),legal=el.getAttribute("data-legal");
  selCo={id:id,working:working,legal:legal};
  g("searchResults").style.display="none";
  g("companySearch").value="";
  var disp='<div class="pill"><span>'+working+(legal?" \u2014 "+legal:"")+'</span><button onclick="clearCo()">\u2715</button></div>';
  g("selectedDisplay").innerHTML=disp;
  updateSRL();
}

function clearCo(){selCo=null;g("selectedDisplay").innerHTML="";updateSRL();}

function showStatus(msg,cls){
  var el=g("statusMsg");
  el.textContent=msg;
  el.className="status "+cls;
  el.style.display="block";
}

async function submitForm(){
  var pname=gv("projectName"),entity=g("lcEntity").value;
  if(!pname){showStatus("Project name is required.","err");return;}
  if(!entity){showStatus("LC Entity is required.","err");return;}
  if(mode==="existing"&&!selCo){showStatus("Please select a production company.","err");return;}
  if(mode==="new"&&!gv("newWorkingName")){showStatus("Company working name is required.","err");return;}
  g("submitBtn").disabled=true;
  showStatus("Creating project...","loading-bar");
  try{
    var coId=selCo?selCo.id:null;
    if(mode==="new"){
      showStatus("Creating production company...","loading-bar");
      var cf={};
      cf[CF.working]=gv("newWorkingName");
      if(gv("newLegalName"))cf[CF.legal]=gv("newLegalName");
      if(gv("newBillingContact"))cf[CF.bContact]=gv("newBillingContact");
      if(gv("newBillingEmail"))cf[CF.bEmail]=gv("newBillingEmail");
      if(gv("newBillingPhone"))cf[CF.bPhone]=gv("newBillingPhone");
      if(gv("newPayrollEmail"))cf[CF.pEmail]=gv("newPayrollEmail");
      if(gv("newBillingAddress"))cf[CF.bAddr]=gv("newBillingAddress");
      if(gv("newBillingNotes"))cf[CF.bNotes]=gv("newBillingNotes");
      if(g("newStudioVendor").checked)cf[CF.studio]=true;
      var nc=await at("POST",CT,{fields:cf,typecast:true});
      coId=nc.id;
    }
    showStatus("Creating project record...","loading-bar");
    var pf={};
    pf[PF.name]=pname;
    pf[PF.entity]=entity;
    if(coId)pf[PF.companies]=[{id:coId}];
    if(gv("payrollDefault"))pf[PF.payroll]=gv("payrollDefault");
    if(gv("season"))pf[PF.season]=gv("season");
    if(g("recurring").checked)pf[PF.recurring]=true;
    if(g("keepActive").checked)pf[PF.keepActive]=true;
    if(gv("projectNotes"))pf[PF.notes]=gv("projectNotes");
    if(gv("systemsOfInterest"))pf[PF.systems]=gv("systemsOfInterest");
    await at("POST",PT,{fields:pf,typecast:true});
    var srl=g("previewSRL").textContent;
    nextNum++;updateSRL();
    showStatus("Project created! SRL: "+srl+". Go to Airtable and check Build Shoot Range to create the first shoot range.","ok");
    g("submitBtn").disabled=false;
  }catch(e){
    showStatus("Error: "+e.message,"err");
    g("submitBtn").disabled=false;
  }
}

function clearForm(){
  ["projectName","season","projectNotes","systemsOfInterest","companySearch","newWorkingName","newLegalName","newBillingContact","newBillingEmail","newBillingPhone","newPayrollEmail","newBillingAddress","newBillingNotes"].forEach(function(id){var el=g(id);if(el)el.value="";});
  g("lcEntity").value="";g("payrollDefault").value="";
  g("recurring").checked=false;g("keepActive").checked=false;
  var sv=g("newStudioVendor");if(sv)sv.checked=false;
  clearCo();setMode("existing");
  g("statusMsg").style.display="none";
  updateSRL();
}

document.addEventListener("click",function(e){if(!e.target.closest(".swrap"))g("searchResults").style.display="none";});
init();
</script>
</body>
</html>
